name: release-windows

on:
  push:
    tags:
      - 'v*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

permissions:
  contents: write

jobs:
  build-frontend-static:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm install --include=dev

      - name: Build frontend static export
        run: |
          cd frontend
          npm run build

      - name: Upload frontend static artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-static-out
          path: frontend/out
          if-no-files-found: error

  build-windows-release:
    runs-on: windows-latest
    needs: build-frontend-static
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install backend dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e './backend[dev]'

      - name: Download frontend static artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-static-out
          path: frontend/out

      - name: Verify release readiness
        shell: pwsh
        run: python release/scripts/verify_release.py --skip-frontend-tests --skip-frontend-build

      - name: Package windows portable bundle
        shell: pwsh
        run: ./release/scripts/package_windows_portable.ps1 -Version ${{ github.ref_name }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/artifacts/*.zip
          generate_release_notes: true
